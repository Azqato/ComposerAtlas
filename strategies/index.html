<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all 12 Composer.trade strategies with backtested metrics, risk profiles, and logic breakdowns.">
  <title>Strategies — ComposerAtlas</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <nav class="nav" id="nav-root"></nav>

  <div class="page">
    <div class="container py-12">
      <div style="max-width:600px;margin-bottom:40px">
        <h1 style="color:var(--color-primary);margin-bottom:8px">Strategies</h1>
        <p style="color:var(--color-secondary);font-size:1.0625rem">
          Backtested systematic investment strategies for Composer.trade,
          with full performance metrics and logic breakdowns.
        </p>
      </div>

      <div class="section-header">
        <h2 style="color:var(--color-primary)">All Strategies</h2>
        <span class="section-count" id="strategy-count"></span>
      </div>

      <div class="grid-3" id="strategy-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <footer id="footer-root"></footer>

  <script src="../data/strategies.js"></script>
  <script src="../data/glossary.js"></script>
  <script src="../js/app.js"></script>
  <script>
    (async function () {
      const strategies = await loadStrategies();
      const grid = document.getElementById('strategy-grid');
      grid.innerHTML = strategies.map(renderStrategyCard).join('');
      document.getElementById('strategy-count').textContent = `${strategies.length} strategies`;
    })().catch(err => {
      document.getElementById('strategy-grid').innerHTML = `
        <div class="error-state" style="grid-column:1/-1">
          <h2>Could not load strategies</h2>
          <p>${err.message}</p>
        </div>`;
    });
  </script>
</body>
</html>
