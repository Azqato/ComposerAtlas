<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Definitions and explanations for indicators, risk metrics, and strategy concepts used in systematic investing with Composer.trade.">
  <title>Glossary — ComposerAtlas</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <nav class="nav" id="nav-root"></nav>

  <div class="page">
    <div class="container py-12">
      <div style="max-width:600px;margin-bottom:40px">
        <h1 style="color:var(--color-primary);margin-bottom:8px">Glossary</h1>
        <p style="color:var(--color-secondary);font-size:1.0625rem">
          Definitions, formulas, and context for the indicators, risk metrics, and strategy
          concepts referenced across the ComposerAtlas strategy library.
        </p>
      </div>

      <div class="section-header">
        <h2 style="color:var(--color-primary)">All Concepts</h2>
        <span class="section-count" id="concept-count"></span>
      </div>

      <div class="grid-3" id="glossary-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <footer id="footer-root"></footer>

  <script src="../data/strategies.js"></script>
  <script src="../data/glossary.js"></script>
  <script src="../js/app.js"></script>
  <script>
    (async function () {
      const [glossary, strategies] = await Promise.all([loadGlossary(), loadStrategies()]);

      // Sort by category, then name
      const sorted = [...glossary].sort((a, b) => {
        if (a.category !== b.category) return a.category.localeCompare(b.category);
        return a.name.localeCompare(b.name);
      });

      function strategyCount(concept) {
        return strategies.filter(s =>
          s.tags && s.tags.some(t => concept.related_tags.includes(t))
        ).length;
      }

      const grid = document.getElementById('glossary-grid');
      grid.innerHTML = sorted.map(c => renderConceptCard(c, strategyCount(c))).join('');
      document.getElementById('concept-count').textContent = `${glossary.length} concepts`;
    })().catch(err => {
      document.getElementById('glossary-grid').innerHTML = `
        <div class="error-state" style="grid-column:1/-1">
          <h2>Could not load glossary</h2>
          <p>${err.message}</p>
        </div>`;
    });
  </script>
</body>
</html>
